version: "3.8"

services:
  db:
    image: postgres:13
    container_name: postgres_db
    environment:
      hostname: localhost
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgresDB
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  db_data:
