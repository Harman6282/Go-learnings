version: "3.8"

services:
  db:
    image: postgres:16.3
    container_name: postgres
    environment:
      POSTGRES_DB: chat-db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
    volumes:
      - chat-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  chat-data: